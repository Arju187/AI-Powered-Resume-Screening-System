<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranked Candidates — AI Powered Resume Screening Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="os-navbar-mount"></div>

<div class="app-shell">
  <div id="os-sidebar-mount"></div>

  <main class="app-main">
    <a href="admin-jobs.html" class="text-muted d-inline-block mb-3" style="font-size:0.85rem;"><i class="fa-solid fa-arrow-left me-1"></i>Back to job postings</a>

    <div class="mb-4">
      <div class="section-eyebrow">TOP MATCHING CANDIDATES</div>
      <h3 class="font-display mt-1" style="font-weight:700;" id="jobTitleHeading">Loading job…</h3>
      <div class="text-muted" id="jobSubheading"></div>
    </div>

    <div class="os-card-flush">
      <table class="os-table">
        <thead>
          <tr>
            <th>Rank</th><th>Candidate</th><th>ATS Score</th><th>Match Score</th>
            <th>Matched Skills</th><th>Missing Skills</th><th>Experience</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="candidatesTableBody">
          <tr><td colspan="9" class="text-center py-4 text-muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
  if (!requireRole("admin")) { throw new Error("redirecting"); }
  window.__navActive = "dashboard";
  renderSidebar("jobs");

  const jobId = new URLSearchParams(window.location.search).get("job");
  if (!jobId) { window.location.href = "admin-jobs.html"; }

  const STATUS_OPTIONS = ["applied", "shortlisted", "interview_scheduled", "selected", "offer_released", "joined", "rejected"];

  async function load() {
    try {
      const [job, ranked] = await Promise.all([Api.getJob(jobId), Api.getRankedCandidates(jobId)]);

      document.getElementById("jobTitleHeading").textContent = job.title;
      document.getElementById("jobSubheading").textContent = `${job.company} · ${job.location || "Remote"} · ${ranked.length} applicant${ranked.length === 1 ? "" : "s"}`;

      const tbody = document.getElementById("candidatesTableBody");
      if (!ranked.length) {
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-muted">No applications yet for this role.</td></tr>`;
        return;
      }

      tbody.innerHTML = ranked.map((r, idx) => `
        <tr>
          <td class="mono fw-bold">#${idx + 1}</td>
          <td>
            <div style="font-weight:600;">${r.full_name}</div>
            <div class="text-muted" style="font-size:0.78rem;">${r.email}</div>
          </td>
          <td class="mono">${Math.round(r.ats_score)}</td>
          <td><span class="mono fw-bold" style="color: var(--signal);">${Math.round(r.recommendation_score)}%</span></td>
          <td>${r.matched_skills.slice(0,4).map(s => `<span class="skill-pill">${s}</span>`).join("") || "<span class='text-muted'>—</span>"}</td>
          <td>${r.missing_skills.slice(0,4).map(s => `<span class="skill-pill missing">${s}</span>`).join("") || "<span class='text-muted'>None</span>"}</td>
          <td>${r.years_experience} yrs</td>
          <td>
            <select class="form-select form-select-sm" style="font-size:0.78rem; min-width:150px;" onchange="updateStatus(${r.application_id}, this.value)">
              ${STATUS_OPTIONS.map(s => `<option value="${s}" ${s === r.application_status ? "selected" : ""}>${statusLabel(s)}</option>`).join("")}
            </select>
          </td>
          <td class="text-end">
            <button class="btn btn-sm" title="View candidate" onclick="window.open('admin-candidates.html', '_self')"><i class="fa-regular fa-eye"></i></button>
          </td>
        </tr>
      `).join("");
    } catch (e) {
      showToast(e.message, "error");
    }
  }

  async function updateStatus(applicationId, status) {
    try {
      await Api.updateApplicationStatus(applicationId, status);
      showToast(`Status updated to "${statusLabel(status)}"`, "success");
    } catch (e) {
      showToast(e.message, "error");
      load();
    }
  }
  window.updateStatus = updateStatus;

  load();
</script>
</body>
</html>
