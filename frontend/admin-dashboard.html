<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — AI Powered Resume Screening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="os-navbar-mount"></div>

<div class="app-shell">
  <div id="os-sidebar-mount"></div>

  <main class="app-main">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
      <div>
        <div class="section-eyebrow">ADMIN CONSOLE</div>
        <h3 class="font-display mt-1" style="font-weight:700;">Recruitment overview</h3>
      </div>
      <a href="admin-jobs.html" class="btn-os-primary"><i class="fa-solid fa-plus me-2"></i>Post a job</a>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-icon mb-2" style="background: var(--teal-light); color: var(--teal);"><i class="fa-solid fa-users"></i></div>
          <div class="stat-label">Total Candidates</div>
          <div class="stat-value" id="statCandidates">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-icon mb-2" style="background: #EEF1F5; color: var(--text-muted);"><i class="fa-solid fa-briefcase"></i></div>
          <div class="stat-label">Open Jobs</div>
          <div class="stat-value" id="statJobs">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-icon mb-2" style="background: var(--amber-light); color: var(--amber);"><i class="fa-regular fa-paper-plane"></i></div>
          <div class="stat-label">Applications</div>
          <div class="stat-value" id="statApplications">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-icon mb-2" style="background: #E2F6E7; color: #1F8A4C;"><i class="fa-solid fa-check"></i></div>
          <div class="stat-label">Selected</div>
          <div class="stat-value" id="statSelected">—</div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-label">Pending Review</div><div class="stat-value" style="font-size:1.5rem;" id="statPending">—</div></div></div>
      <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-label">Shortlisted</div><div class="stat-value" style="font-size:1.5rem;" id="statShortlisted">—</div></div></div>
      <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-label">Rejected</div><div class="stat-value" style="font-size:1.5rem;" id="statRejected">—</div></div></div>
      <div class="col-6 col-md-3"><div class="stat-card"><div class="stat-label">Avg ATS Score</div><div class="stat-value" style="font-size:1.5rem;" id="statAvgAts">—</div></div></div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-lg-5">
        <div class="os-card h-100">
          <div class="section-eyebrow mb-3">APPLICATIONS — LAST 6 MONTHS</div>
          <canvas id="monthChart" height="220"></canvas>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="os-card h-100">
          <div class="section-eyebrow mb-3">HIRING FUNNEL</div>
          <canvas id="funnelChart" height="220"></canvas>
        </div>
      </div>
      <div class="col-lg-3">
        <div class="os-card h-100">
          <div class="section-eyebrow mb-3">TOP SKILLS</div>
          <div id="topSkillsList"></div>
        </div>
      </div>
    </div>

    <div class="os-card">
      <div class="section-eyebrow mb-3">RECENT ACTIVITY</div>
      <div id="recentActivityList" class="text-muted">Loading…</div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
  if (!requireRole("admin")) { throw new Error("redirecting"); }
  window.__navActive = "dashboard";
  renderSidebar("dashboard");

  async function loadDashboard() {
    try {
      const stats = await Api.adminDashboard();

      document.getElementById("statCandidates").textContent = stats.total_candidates;
      document.getElementById("statJobs").textContent = stats.open_jobs;
      document.getElementById("statApplications").textContent = stats.total_applications;
      document.getElementById("statSelected").textContent = stats.selected;
      document.getElementById("statPending").textContent = stats.pending;
      document.getElementById("statShortlisted").textContent = stats.shortlisted;
      document.getElementById("statRejected").textContent = stats.rejected;
      document.getElementById("statAvgAts").textContent = stats.average_ats_score;

      // Applications over time
      const monthCtx = document.getElementById("monthChart");
      if (stats.applications_by_month.length) {
        new Chart(monthCtx, {
          type: "bar",
          data: {
            labels: stats.applications_by_month.map(m => m.month),
            datasets: [{ data: stats.applications_by_month.map(m => m.count), backgroundColor: "#FF6B4A", borderRadius: 4, maxBarThickness: 36 }],
          },
          options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } },
        });
      } else {
        monthCtx.parentElement.innerHTML = `<div class="section-eyebrow mb-3">APPLICATIONS — LAST 6 MONTHS</div><div class="empty-state"><i class="fa-regular fa-chart-bar"></i>No applications yet.</div>`;
      }

      // Hiring funnel
      const funnelCtx = document.getElementById("funnelChart");
      const sb = stats.status_breakdown;
      const funnelLabels = ["applied", "shortlisted", "interview_scheduled", "selected", "joined"];
      new Chart(funnelCtx, {
        type: "bar",
        data: {
          labels: funnelLabels.map(statusLabel),
          datasets: [{ data: funnelLabels.map(l => sb[l] || 0), backgroundColor: "#157A75", borderRadius: 4 }],
        },
        options: { indexAxis: "y", plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { precision: 0 } } } },
      });

      // Top skills
      const skillsMount = document.getElementById("topSkillsList");
      skillsMount.innerHTML = stats.top_skills.length
        ? stats.top_skills.map(s => `
            <div class="d-flex justify-content-between align-items-center mb-2">
              <span style="font-size:0.85rem;">${s.skill}</span>
              <span class="mono fw-bold" style="font-size:0.8rem; color: var(--text-muted);">${s.count}</span>
            </div>`).join("")
        : `<div class="text-muted" style="font-size:0.85rem;">No data yet.</div>`;

      // Recent activity
      const activityMount = document.getElementById("recentActivityList");
      activityMount.innerHTML = stats.recent_activity.length
        ? stats.recent_activity.map(a => `
            <div class="d-flex justify-content-between align-items-center py-2" style="border-bottom: 1px solid var(--line); font-size:0.88rem;">
              <div><span style="font-weight:600;">${a.candidate_name}</span> applied for <span style="font-weight:600;">${a.job_title}</span></div>
              <div class="d-flex align-items-center gap-2">
                <span class="status-pill status-${a.status}">${statusLabel(a.status)}</span>
                <span class="text-muted mono" style="font-size:0.72rem;">${timeAgo(a.applied_at)}</span>
              </div>
            </div>`).join("")
        : `<div class="empty-state py-3"><i class="fa-regular fa-bell"></i>No activity yet.</div>`;

    } catch (e) { showToast(e.message, "error"); }
  }
  loadDashboard();
</script>
</body>
</html>
