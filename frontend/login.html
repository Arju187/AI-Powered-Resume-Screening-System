<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — AI Powered Resume Screening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-side">
    <div class="grid-bg"></div>
    <div class="scan-line"></div>
    <div class="position-relative">
      <a href="index.html" class="brand text-decoration-none d-inline-flex mb-5" style="color:#fff;">
        <span class="dot"></span>&nbsp;AI Powered Resume Screening  <span class="sub"></span>
      </a>
      <h1 class="font-display" style="color:#fff; font-size:2.1rem; font-weight:700; max-width: 420px;">Welcome back to the screening console.</h1>
      <p style="color: var(--text-on-ink-muted); max-width: 400px;">Log in to track your applications and ATS score, or manage candidates and job postings as an admin.</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-form-card">
      <h3 class="font-display mb-1" style="font-weight:700;">Log in</h3>
      <p class="text-muted mb-4">Enter your credentials to continue.</p>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required autocomplete="email">
        </div>
        <div class="mb-2">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" required autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" id="togglePw" style="border-color: var(--line-strong);"><i class="fa-regular fa-eye"></i></button>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label text-muted" for="rememberMe" style="font-size:0.88rem;">Remember me</label>
          </div>
          <a href="#" style="font-size:0.85rem;" id="forgotPwLink">Forgot password?</a>
        </div>

        <div class="alert alert-danger py-2 px-3 d-none" id="loginError" style="font-size:0.86rem; border-radius: var(--radius-sm);"></div>

        <button type="submit" class="btn-os-primary w-100" id="loginBtn">
          <span id="loginBtnText">Log in</span>
        </button>
      </form>

      <div class="text-center mt-4 text-muted" style="font-size:0.9rem;">
        Don't have an account? <a href="register.html">Register as a candidate</a>
      </div>

      <div class="divider-line"></div>
      <div class="text-center text-muted mono" style="font-size: 0.74rem;">
        
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
  if (Auth.isLoggedIn()) {
    window.location.href = Auth.getRole() === "admin" ? "admin-dashboard.html" : "candidate-dashboard.html";
  }

  document.getElementById("togglePw").addEventListener("click", () => {
    const pw = document.getElementById("password");
    const icon = document.querySelector("#togglePw i");
    const isPw = pw.type === "password";
    pw.type = isPw ? "text" : "password";
    icon.className = isPw ? "fa-regular fa-eye-slash" : "fa-regular fa-eye";
  });

  document.getElementById("forgotPwLink").addEventListener("click", (e) => {
    e.preventDefault();
    showToast("Password reset isn't wired up in this build — contact an admin to reset your password.", "info");
  });

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errBox = document.getElementById("loginError");
    errBox.classList.add("d-none");

    const btn = document.getElementById("loginBtn");
    const btnText = document.getElementById("loginBtnText");
    btn.disabled = true;
    btnText.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Logging in…`;

    try {
      const result = await Api.login({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        remember_me: document.getElementById("rememberMe").checked,
      });
      Auth.setSession(result);
      showToast(`Welcome back, ${result.full_name.split(" ")[0]}!`, "success");
      setTimeout(() => {
        window.location.href = result.role === "admin" ? "admin-dashboard.html" : "candidate-dashboard.html";
      }, 400);
    } catch (err) {
      errBox.textContent = err.message;
      errBox.classList.remove("d-none");
      btn.disabled = false;
      btnText.textContent = "Log in";
    }
  });
</script>
</body>
</html>
