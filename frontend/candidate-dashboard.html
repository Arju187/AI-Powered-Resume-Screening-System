<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — AI Powered Resume Screening</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="os-navbar-mount"></div>

<div class="app-shell">
  <div id="os-sidebar-mount"></div>

  <main class="app-main">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-4">
      <div>
        <div class="section-eyebrow">CANDIDATE WORKSPACE</div>
        <h3 class="font-display mt-1" style="font-weight:700;" id="welcomeHeading">Welcome back</h3>
      </div>
      <a href="profile.html" class="btn-os-outline"><i class="fa-solid fa-pen me-2"></i>Edit profile</a>
    </div>

    <!-- Summary cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-icon mb-2" style="background: var(--teal-light); color: var(--teal);"><i class="fa-solid fa-briefcase"></i></div>
          <div class="stat-label">Open Jobs</div>
          <div class="stat-value" id="statOpenJobs">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-icon mb-2" style="background: #EEF1F5; color: var(--text-muted);"><i class="fa-regular fa-paper-plane"></i></div>
          <div class="stat-label">Applied</div>
          <div class="stat-value" id="statApplied">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-icon mb-2" style="background: var(--amber-light); color: var(--amber);"><i class="fa-regular fa-star"></i></div>
          <div class="stat-label">Shortlisted</div>
          <div class="stat-value" id="statShortlisted">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="stat-icon mb-2" style="background: #E2F6E7; color: #1F8A4C;"><i class="fa-solid fa-check"></i></div>
          <div class="stat-label">Selected</div>
          <div class="stat-value" id="statSelected">—</div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <!-- ATS score + profile completion -->
      <div class="col-lg-4">
        <div class="os-card h-100">
          <div class="section-eyebrow mb-2">RESUME STRENGTH</div>
          <div class="d-flex align-items-center gap-3">
            <div id="dashGauge"></div>
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between" style="font-size:0.82rem;">
                <span class="text-muted">Profile completion</span>
                <span class="fw-bold" id="profileCompletionPct">0%</span>
              </div>
              <div class="progress mt-1" style="height:6px; border-radius:4px;">
                <div class="progress-bar" id="profileCompletionBar" style="background: var(--signal); width:0%;"></div>
              </div>
              <a href="profile.html" class="d-inline-block mt-3 btn-os-teal" style="font-size:0.82rem; padding:0.4rem 0.9rem;">Improve score</a>
            </div>
          </div>
          <hr class="divider-line">
          <div id="atsBreakdown" class="d-flex flex-wrap gap-2"></div>
        </div>
      </div>

      <!-- Recommended jobs -->
      <div class="col-lg-8">
        <div class="os-card h-100">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="section-eyebrow">RECOMMENDED FOR YOU</div>
            <a href="jobs.html" class="text-muted" style="font-size:0.82rem;">View all jobs <i class="fa-solid fa-arrow-right ms-1"></i></a>
          </div>
          <div id="recommendedJobsList">
            <div class="skeleton" style="height:60px; margin-bottom:10px;"></div>
            <div class="skeleton" style="height:60px; margin-bottom:10px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <!-- Application status chart -->
      <div class="col-lg-5">
        <div class="os-card h-100">
          <div class="section-eyebrow mb-3">APPLICATION STATUS</div>
          <canvas id="statusChart" height="200"></canvas>
        </div>
      </div>

      <!-- Recent activity -->
      <div class="col-lg-7">
        <div class="os-card h-100">
          <div class="section-eyebrow mb-3">RECENT ACTIVITY</div>
          <div id="recentActivityList" class="text-muted" style="font-size:0.9rem;">Loading…</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
  if (!requireRole("candidate")) { throw new Error("redirecting"); }
  window.__navActive = "dashboard";
  renderSidebar("dashboard");
  document.getElementById("welcomeHeading").textContent = `Welcome back, ${Auth.getName().split(" ")[0]}`;

  async function loadDashboard() {
    try {
      const [profile, recommendations, applications, jobs, notifications] = await Promise.all([
        Api.getMyProfile(),
        Api.getRecommendations(),
        Api.myApplications(),
        Api.listJobs("?page_size=100"),
        Api.myNotifications(),
      ]);

      // Stat cards
      document.getElementById("statOpenJobs").textContent = jobs.length;
      document.getElementById("statApplied").textContent = applications.length;
      document.getElementById("statShortlisted").textContent = applications.filter(a => a.status === "shortlisted").length;
      document.getElementById("statSelected").textContent = applications.filter(a => a.status === "selected" || a.status === "joined").length;

      // ATS gauge + completion
      renderAtsGauge(document.getElementById("dashGauge"), profile.ats_score);
      document.getElementById("profileCompletionPct").textContent = `${Math.round(profile.profile_completion)}%`;
      document.getElementById("profileCompletionBar").style.width = `${profile.profile_completion}%`;

      const breakdown = profile.ats_breakdown || {};
      const breakdownLabels = { skill_match: "Skills", experience_match: "Experience", education_match: "Education", projects_match: "Projects", certifications_match: "Certifications", completeness: "Completeness" };
      document.getElementById("atsBreakdown").innerHTML = Object.entries(breakdownLabels).map(([key, label]) => `
        <div style="font-size:0.74rem;" class="text-muted">${label}: <span class="fw-bold text-dark mono">${breakdown[key] ?? 0}%</span></div>
      `).join("");

      // Recommended jobs
      const recoMount = document.getElementById("recommendedJobsList");
      if (!profile.resume_path) {
        recoMount.innerHTML = `<div class="empty-state py-3"><i class="fa-regular fa-file-pdf"></i>Upload your resume to unlock job recommendations.<br><a href="profile.html" class="btn-os-primary mt-3 d-inline-block">Upload resume</a></div>`;
      } else if (!recommendations.length) {
        recoMount.innerHTML = `<div class="empty-state py-3"><i class="fa-regular fa-compass"></i>No strong matches yet — add more skills to your profile to surface more roles.</div>`;
      } else {
        recoMount.innerHTML = recommendations.slice(0, 4).map(r => `
          <div class="d-flex justify-content-between align-items-center py-2" style="border-bottom: 1px solid var(--line);">
            <div>
              <div class="fw-bold">${r.title}</div>
              <div class="text-muted" style="font-size:0.82rem;">${r.company} · ${r.matched_skills.length} matched skills</div>
            </div>
            <div class="d-flex align-items-center gap-2">
              <span class="mono fw-bold" style="color: var(--signal);">${Math.round(r.recommendation_score)}%</span>
              <a href="jobs.html?job=${r.job_id}" class="btn-os-outline" style="padding:0.35rem 0.8rem; font-size:0.82rem;">View</a>
            </div>
          </div>
        `).join("");
      }

      // Status chart
      const statusCounts = {};
      applications.forEach(a => { statusCounts[a.status] = (statusCounts[a.status] || 0) + 1; });
      const ctx = document.getElementById("statusChart");
      if (Object.keys(statusCounts).length === 0) {
        ctx.parentElement.innerHTML = `<div class="section-eyebrow mb-3">APPLICATION STATUS</div><div class="empty-state"><i class="fa-regular fa-chart-bar"></i>No applications yet.</div>`;
      } else {
        new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: Object.keys(statusCounts).map(statusLabel),
            datasets: [{
              data: Object.values(statusCounts),
              backgroundColor: ["#FF6B4A", "#157A75", "#C98A12", "#1F8A4C", "#0E1A2B", "#C9402F", "#5B6472"],
              borderWidth: 0,
            }],
          },
          options: { plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 11 } } } } },
        });
      }

      // Recent activity = recent notifications
      const activityMount = document.getElementById("recentActivityList");
      if (!notifications.length) {
        activityMount.innerHTML = `<div class="empty-state py-2"><i class="fa-regular fa-bell"></i>No recent activity yet.</div>`;
      } else {
        activityMount.innerHTML = notifications.slice(0, 6).map(n => `
          <div class="d-flex gap-2 py-2" style="border-bottom: 1px solid var(--line);">
            <i class="fa-solid fa-circle mt-1" style="font-size:0.4rem; color: var(--signal);"></i>
            <div>
              <div class="text-dark" style="font-weight:600; font-size:0.86rem;">${n.title}</div>
              <div class="text-muted" style="font-size:0.82rem;">${n.message}</div>
              <div class="text-muted mono" style="font-size:0.72rem;">${timeAgo(n.created_at)}</div>
            </div>
          </div>
        `).join("");
      }
    } catch (err) {
      showToast(err.message, "error");
    }
  }
  loadDashboard();
</script>
</body>
</html>
